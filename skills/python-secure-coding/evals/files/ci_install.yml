# Supply-chain risk fixture: unpinned installs from a broad index.
name: install
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-loose.txt --extra-index-url https://example-index.invalid/simple
