# conf.d style snippet — do not nest events/http here.
# Goal: location /api/ should reach backend /v1/ correctly.

upstream backend {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name api.example.com;

    # Broken combination for evaluation: clarify intended URI rewrite.
    location /api/ {
        proxy_pass http://backend/v1;
    }
}
